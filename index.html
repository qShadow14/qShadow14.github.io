<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Maintenance</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --neon: #ffffff;
      --neon-glow: 0 0 8px #fff, 0 0 20px #fff, 0 0 40px #fff, 0 0 80px #e0e0e0;
      --neon-soft: 0 0 4px #fff, 0 0 12px #ccc;
    }

    body {
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
      position: relative;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255,255,255,0.015) 2px,
        rgba(255,255,255,0.015) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    /* Subtle vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
      z-index: 9;
    }

    .container {
      text-align: center;
      position: relative;
      z-index: 5;
      padding: 2rem;
    }

    /* Flicker animation */
    @keyframes flicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
      20%, 24%, 55% { opacity: 0.85; }
    }

    @keyframes pulse-glow {
      0%, 100% { text-shadow: var(--neon-glow); }
      50% { text-shadow: 0 0 6px #fff, 0 0 14px #fff, 0 0 30px #ccc; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .maintenance-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(4rem, 15vw, 11rem);
      letter-spacing: 0.08em;
      color: #fff;
      text-shadow: var(--neon-glow);
      animation: flicker 6s infinite, pulse-glow 3s ease-in-out infinite;
      line-height: 1;
      margin-bottom: 0.3em;
    }

    .down-label {
      font-size: clamp(0.75rem, 2vw, 1rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 0.6rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.2s;
    }

    .divider {
      width: 60%;
      max-width: 500px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #fff, transparent);
      margin: 0.8rem auto 1.6rem;
      box-shadow: 0 0 8px #fff;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.3s;
    }

    .countdown-label {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.5s;
    }

    .countdown {
      display: flex;
      gap: clamp(0.8rem, 3vw, 2rem);
      justify-content: center;
      align-items: flex-end;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.7s;
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }

    .unit-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 7vw, 5rem);
      color: #fff;
      text-shadow: var(--neon-soft);
      line-height: 1;
      min-width: 2ch;
    }

    .unit-label {
      font-size: 0.55rem;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
    }

    .sep {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 6vw, 4rem);
      color: rgba(255,255,255,0.2);
      padding-bottom: 0.4rem;
      animation: blink 1s step-end infinite;
    }

    .credit {
      margin-top: 0.5rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 1.1s;
    }

    .credit-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      color: #fff;
      text-shadow: var(--neon-soft);
      letter-spacing: 0.12em;
    }

    .credit-sub {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.38);
      text-transform: uppercase;
      margin-top: 0.4rem;
      line-height: 1.7;
    }

    .cursor {
      display: inline-block;
      width: 0.5em;
      height: 1em;
      background: #fff;
      vertical-align: middle;
      margin-left: 2px;
      box-shadow: var(--neon-soft);
      animation: blink 0.9s step-end infinite;
    }

    /* Noise grain */
    .grain {
      position: fixed;
      inset: -50%;
      width: 200%;
      height: 200%;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 8;
      animation: grainMove 0.15s steps(1) infinite;
    }

    @keyframes grainMove {
      0%   { transform: translate(0, 0); }
      25%  { transform: translate(-2%, -3%); }
      50%  { transform: translate(3%, 1%); }
      75%  { transform: translate(-1%, 4%); }
      100% { transform: translate(2%, -2%); }
    }
  </style>
</head>
<body>
  <div class="grain"></div>
  <div class="container">
    <div class="maintenance-title">MAINTENANCE</div>
    <div class="down-label">Website is down for</div>
    <div class="divider"></div>

    <div class="countdown">
      <div class="unit">
        <span class="unit-value" id="weeks">04</span>
        <span class="unit-label">Weeks</span>
      </div>
      <div class="sep">:</div>
      <div class="unit">
        <span class="unit-value" id="days">05</span>
        <span class="unit-label">Days</span>
      </div>
      <div class="sep">:</div>
      <div class="unit">
        <span class="unit-value" id="hours">06</span>
        <span class="unit-label">Hours</span>
      </div>
      <div class="sep">:</div>
      <div class="unit">
        <span class="unit-value" id="minutes">25</span>
        <span class="unit-label">Minutes</span>
      </div>
      <div class="sep">:</div>
      <div class="unit">
        <span class="unit-value" id="seconds">42</span>
        <span class="unit-label">Seconds</span>
      </div>
    </div>

    <div class="credit">
      <div class="credit-name">qShadow<span style="color:rgba(255,255,255,0.3)">/</span>Vexor</div>
      <div class="credit-sub">Is working on the website right now</div>
    </div>
  </div>

  <script>
    // Count UP from a fixed start time stored in localStorage
    const STORAGE_KEY = 'maintenance_start';

    let startTime = parseInt(localStorage.getItem(STORAGE_KEY) || '0', 10);

    if (!startTime) {
      // First visit — set start to: now minus (4w 5d 6h 25m 42s) so it begins at that value
      const INITIAL_SECONDS =
        4 * 7 * 24 * 3600
        + 5 * 24 * 3600
        + 6 * 3600
        + 25 * 60
        + 42;
      startTime = Date.now() - INITIAL_SECONDS * 1000;
      localStorage.setItem(STORAGE_KEY, startTime.toString());
    }

    const pad = n => String(n).padStart(2, '0');

    function tick() {
      let elapsed = Math.floor((Date.now() - startTime) / 1000);

      const weeks   = Math.floor(elapsed / (7 * 24 * 3600));
      elapsed      -= weeks * 7 * 24 * 3600;
      const days    = Math.floor(elapsed / (24 * 3600));
      elapsed      -= days * 24 * 3600;
      const hours   = Math.floor(elapsed / 3600);
      elapsed      -= hours * 3600;
      const minutes = Math.floor(elapsed / 60);
      const seconds = elapsed % 60;

      document.getElementById('weeks').textContent   = pad(weeks);
      document.getElementById('days').textContent    = pad(days);
      document.getElementById('hours').textContent   = pad(hours);
      document.getElementById('minutes').textContent = pad(minutes);
      document.getElementById('seconds').textContent = pad(seconds);
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
